  <path d="M14 24 L28 36" stroke="url(#grad-orange-f)" stroke-width="4" stroke-linecap="round" filter="url(#glow-f)"/>
  <circle cx="28" cy="12" r="2.5" fill="url(#grad-green-f)" filter="url(#glow-f)"/>
  <circle cx="28" cy="36" r="2.5" fill="url(#grad-green-f)" filter="url(#glow-f)"/>
  <path d="M30.5 12 L36 12 L36 18" stroke="url(#grad-green-f)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <path d="M30.5 36 L36 36 L36 30" stroke="url(#grad-green-f)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <circle cx="36" cy="18" r="1.5" fill="#4EDEA3" opacity="0.9"/>
  <circle cx="36" cy="30" r="1.5" fill="#4EDEA3" opacity="0.9"/>
