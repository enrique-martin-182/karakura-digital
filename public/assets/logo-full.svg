<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <defs>
    <linearGradient id="grad-orange-f" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#FFB68B"/>
    </linearGradient>
    <linearGradient id="grad-green-f" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4EDEA3"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
